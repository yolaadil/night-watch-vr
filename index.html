<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch Interactive</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, Tahoma, sans-serif;
}

#languageOverlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.72);
  display: flex;
  align-items: center;
  justify-content: center;
}

#languageBox {
  width: min(520px, 90vw);
  background: rgba(20,20,20,0.94);
  color: white;
  border-radius: 18px;
  padding: 28px 24px;
  text-align: center;
}

#languageBox h1 {
  margin: 0 0 12px;
  color: #ffe680;
  font-size: 30px;
}

#languageBox p {
  color: #ddd;
  font-size: 17px;
}

.languageButton {
  cursor: pointer;
  border: none;
  border-radius: 12px;
  padding: 13px 22px;
  margin: 8px;
  font-size: 18px;
  background: #333;
  color: white;
}

.languageButton:hover {
  background: #555;
}

.tourOption {
  background: #2b2b2b;
  border: 1px solid #444;
  border-radius: 14px;
  padding: 15px;
  margin: 12px 0;
  cursor: pointer;
}

.tourOption:hover {
  background: #444;
  border-color: #ffe680;
}

.tourOption h2 {
  margin: 0 0 7px;
  color: #ffe680;
  font-size: 20px;
}

.tourOption p {
  margin: 0;
  font-size: 15px;
  color: #ddd;
}
</style>
</head>

<body>

<div id="languageOverlay">
  <div id="languageBox">
    <h1>The Night Watch</h1>
    <p>Choose language / اختر اللغة</p>
    <button class="languageButton" onclick="selectLanguage('en')">English</button>
    <button class="languageButton" onclick="selectLanguage('ar')">العربية</button>
  </div>
</div>

<a-scene>

  <!-- Painting -->
  <a-image
    src="painting.jpg"
    position="0 1.6 -3"
    width="4"
    height="3.45">
  </a-image>

  <!-- GLOWING HALOS: hidden until gaze enters -->
  <a-circle id="captainHalo" position="-0.03 1.28 -2.94" radius="0.26" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="lieutenantHalo" position="0.48 1.25 -2.94" radius="0.26" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="girlHalo" position="-0.66 1.12 -2.94" radius="0.23" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="drummerHalo" position="1.60 1.15 -2.94" radius="0.33" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="flagHalo" position="-0.68 1.82 -2.94" radius="0.34" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="musketeerHalo" position="-1.10 1.45 -2.94" radius="0.24" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="dogHalo" position="1.08 0.58 -2.94" radius="0.22" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="leftGroupHalo" position="-1.45 1.63 -2.94" radius="0.32" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="rightGroupHalo" position="1.42 1.55 -2.94" radius="0.38" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="backgroundArchHalo" position="0.45 2.25 -2.94" radius="0.35" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>

  <a-circle id="chickenClawsHalo" position="-0.72 1.02 -2.94" radius="0.17" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="drinkingHornHalo" position="-0.58 1.16 -2.94" radius="0.17" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="weaponsHalo" position="-1.00 1.35 -2.94" radius="0.24" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="spearsHalo" position="0.90 2.05 -2.94" radius="0.36" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="lightHalo" position="-0.25 1.20 -2.94" radius="0.40" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>
  <a-circle id="shieldHalo" position="0.58 1.90 -2.94" radius="0.18" color="#ffe680" visible="false" material="transparent:true; opacity:0.06"></a-circle>

  <a-circle id="captainHandHalo" position="-0.23 1.45 -2.94" radius="0.16" color="#ffb347" visible="false" material="transparent:true; opacity:0.08"></a-circle>
  <a-circle id="redSashHalo" position="-0.10 1.25 -2.94" radius="0.18" color="#ffb347" visible="false" material="transparent:true; opacity:0.08"></a-circle>

  <!-- INVISIBLE HOTSPOTS -->
  <a-plane class="hotspot gallery" id="captain" position="-0.03 1.28 -2.95" width="0.35" height="0.75" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="lieutenant" position="0.48 1.25 -2.95" width="0.35" height="0.80" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="girl" position="-0.66 1.12 -2.95" width="0.32" height="0.60" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="drummer" position="1.60 1.15 -2.95" width="0.55" height="0.88" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="flag" position="-0.68 1.82 -2.95" width="0.58" height="0.95" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="musketeer" position="-1.10 1.45 -2.95" width="0.35" height="0.65" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="dog" position="1.08 0.58 -2.95" width="0.45" height="0.25" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="leftGroup" position="-1.45 1.63 -2.95" width="0.55" height="0.80" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="rightGroup" position="1.42 1.55 -2.95" width="0.70" height="0.88" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot gallery" id="backgroundArch" position="0.45 2.25 -2.95" width="0.80" height="0.55" material="opacity:0; transparent:true"></a-plane>

  <a-plane class="hotspot curatorOnly" id="chickenClaws" position="-0.72 1.02 -2.95" width="0.24" height="0.24" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="drinkingHorn" position="-0.58 1.16 -2.95" width="0.24" height="0.24" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="weapons" position="-1.00 1.35 -2.95" width="0.36" height="0.45" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="spears" position="0.90 2.05 -2.95" width="0.90" height="0.45" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="light" position="-0.25 1.20 -2.95" width="0.80" height="0.75" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly" id="shield" position="0.58 1.90 -2.95" width="0.30" height="0.25" material="opacity:0; transparent:true"></a-plane>

  <a-plane class="hotspot curatorOnly captainDetail" id="captainHand" visible="false" position="-0.23 1.45 -2.95" width="0.28" height="0.20" material="opacity:0; transparent:true"></a-plane>
  <a-plane class="hotspot curatorOnly captainDetail" id="redSash" visible="false" position="-0.10 1.25 -2.95" width="0.22" height="0.30" material="opacity:0; transparent:true"></a-plane>

  <!-- Text panels -->
  <a-plane id="infoPanel" visible="false" position="0 0 -2.8" width="1.35" height="0.5" material="transparent:true; opacity:1"></a-plane>
  <a-plane id="welcomePanel" visible="false" position="0 0.55 -2.8" width="1.9" height="0.48" material="transparent:true; opacity:1"></a-plane>

  <!-- Camera and gaze cursor -->
  <a-camera position="0 1.6 0">
    <a-cursor
      id="gazeCursor"
      visible="false"
      fuse="true"
      fuse-timeout="2000"
      raycaster="objects: .hotspot"
      color="black">
    </a-cursor>
  </a-camera>

</a-scene>

<script>
const infoPanel = document.querySelector('#infoPanel');
const welcomePanel = document.querySelector('#welcomePanel');
const gazeCursor = document.querySelector('#gazeCursor');
const languageOverlay = document.querySelector('#languageOverlay');
const languageBox = document.querySelector('#languageBox');

let pageReady = false;
let currentLanguage = null;
let tourMode = null;
let closeTimer = null;
let activeHotspot = null;
let lastTextChangeTime = 0;
let infoTimer = null;

const galleryHotspots = [
  'captain','lieutenant','girl','drummer','flag',
  'musketeer','dog','leftGroup','rightGroup','backgroundArch'
];

const curatorHotspots = [
  ...galleryHotspots,
  'chickenClaws','drinkingHorn','weapons','spears',
  'light','shield','captainHand','redSash'
];

const hotspotTexts = {
  captain: {
    en: 'Captain Frans Banninck Cocq\n\nLeader of the Amsterdam civic guard company. In Curator’s Tour, selecting him reveals smaller details such as his hand and red sash.',
    ar: 'الكابتن فرانس بانينك كوك\n\nقائد فرقة الحرس المدني في أمستردام. في جولة القيّم الفني، يكشف اختياره عن تفاصيل أصغر مثل يده ووشاحه الأحمر.'
  },
  lieutenant: {
    en: 'Lieutenant Willem van Ruytenburch\n\nThe lieutenant stands beside the captain in bright yellow clothing, helping draw the viewer’s eye to the center.',
    ar: 'الملازم فيليم فان رويتنبرخ\n\nيقف بجانب القائد بملابس صفراء لامعة، مما يجذب نظر المشاهد نحو مركز اللوحة.'
  },
  girl: {
    en: 'The Illuminated Girl\n\nShe is not a regular militia member. She works as a symbolic figure, carrying objects connected to the identity of the civic guard.',
    ar: 'الفتاة المضيئة\n\nليست عضوة عادية في الحرس، بل تظهر كشخصية رمزية تحمل أشياء مرتبطة بهوية الفرقة.'
  },
  drummer: {
    en: 'The Drummer\n\nThe drummer adds rhythm, sound, and movement, making the scene feel like a company about to march.',
    ar: 'قارِع الطبل\n\nيضيف الإيقاع والصوت والحركة، فيجعل المشهد يبدو كفرقة تستعد للسير.'
  },
  flag: {
    en: 'The Flag Bearer\n\nThe flag identifies the militia company and adds ceremony to the scene.',
    ar: 'حامل الراية\n\nتُعرّف الراية بفرقة الحرس وتضيف طابعًا احتفاليًا إلى المشهد.'
  },
  musketeer: {
    en: 'The Musketeer\n\nThe armed guards refer to the civic militia’s role and training.',
    ar: 'حامل البندقية\n\nيشير الحراس المسلحون إلى دور وتدريب الميليشيا المدنية.'
  },
  dog: {
    en: 'The Dog\n\nA small lively detail near the drummer. It adds spontaneity and everyday life to the crowded scene.',
    ar: 'الكلب\n\nتفصيل صغير وحيوي قرب قارع الطبل، يضيف عفوية وإحساسًا بالحياة اليومية.'
  },
  leftGroup: {
    en: 'Left Group of Guards\n\nThese overlapping figures create depth and help turn the group portrait into a busy, moving scene.',
    ar: 'مجموعة الحراس اليسرى\n\nتخلق هذه الشخصيات المتداخلة عمقًا بصريًا وتحول الصورة الجماعية إلى مشهد متحرك.'
  },
  rightGroup: {
    en: 'Right Group of Guards\n\nThe figures on the right balance the central pair and expand the sense of a large company gathering.',
    ar: 'مجموعة الحراس اليمنى\n\nتوازن الشخصيات في اليمين الثنائي المركزي وتوسع الإحساس بتجمع فرقة كبيرة.'
  },
  backgroundArch: {
    en: 'Background Architecture\n\nThe dark architectural space frames the action and strengthens Rembrandt’s dramatic use of light and shadow.',
    ar: 'الخلفية المعمارية\n\nتؤطر المساحة المعمارية الداكنة المشهد وتعزز استخدام رامبرانت الدرامي للضوء والظل.'
  },
  captainHand: {
    en: 'The Captain’s Hand\n\nHis outstretched hand is one of the painting’s famous details and helps guide the viewer’s attention toward the central action.',
    ar: 'يد القائد\n\nتُعد يده الممدودة من التفاصيل الشهيرة في اللوحة وتساعد في توجيه نظر المشاهد نحو الحركة المركزية.'
  },
  redSash: {
    en: 'The Red Sash\n\nThe captain’s red sash helps him stand out against the darker clothing and reinforces his leading role.',
    ar: 'الوشاح الأحمر\n\nيساعد وشاح القائد الأحمر على تمييزه وسط الملابس الداكنة ويؤكد دوره القيادي.'
  },
  chickenClaws: {
    en: 'Chicken Claws\n\nThe claws carried by the girl are linked to the emblem of the arquebusiers, helping identify the militia company.',
    ar: 'مخالب الدجاجة\n\nترتبط المخالب التي تحملها الفتاة بشعار حملة البنادق، وتساعد في تحديد هوية الفرقة.'
  },
  drinkingHorn: {
    en: 'Drinking Horn\n\nThe girl also carries a ceremonial object linked to militia tradition and group identity.',
    ar: 'قرن الشرب\n\nتحمل الفتاة أيضًا غرضًا احتفاليًا مرتبطًا بتقاليد الميليشيا وهوية الجماعة.'
  },
  weapons: {
    en: 'Weapons and Training\n\nThe weapons suggest the civic guard’s military role, but Rembrandt turns them into part of a theatrical composition.',
    ar: 'الأسلحة والتدريب\n\nتشير الأسلحة إلى الدور العسكري للحرس المدني، لكن رامبرانت يجعلها جزءًا من تكوين مسرحي.'
  },
  spears: {
    en: 'Spears and Lines\n\nThe long spears and poles create diagonal lines that guide the viewer’s eye through the painting.',
    ar: 'الرماح والخطوط\n\nتخلق الرماح والعصي الطويلة خطوطًا قطرية تقود عين المشاهد عبر اللوحة.'
  },
  light: {
    en: 'Light and Shadow\n\nRembrandt uses strong contrasts of light and darkness to guide attention and create drama.',
    ar: 'الضوء والظل\n\nيستخدم رامبرانت تباينًا قويًا بين الضوء والظلام لتوجيه الانتباه وخلق الدراما.'
  },
  shield: {
    en: 'Shield with Names\n\nA shield in the background records the names of members of the company, connecting the painting to its patrons.',
    ar: 'درع الأسماء\n\nيسجل الدرع في الخلفية أسماء أعضاء الفرقة، ويربط اللوحة بمن كلفوا برسمها.'
  }
};

function selectLanguage(language) {
  currentLanguage = language;

  if (language === 'ar') {
    languageBox.innerHTML = `
      <h1>الحراسة الليلية</h1>
      <p>اختر نوع الجولة</p>
      <div class="tourOption" onclick="selectTour('gallery')" style="text-align:right">
        <h2>جولة المعرض</h2>
        <p>تعرف على الشخصيات والعناصر الرئيسية.</p>
      </div>
      <div class="tourOption" onclick="selectTour('curator')" style="text-align:right">
        <h2>جولة القيّم الفني</h2>
        <p>اكتشف الرموز والتفاصيل الخفية.</p>
      </div>
    `;
  } else {
    languageBox.innerHTML = `
      <h1>The Night Watch</h1>
      <p>Choose your tour</p>
      <div class="tourOption" onclick="selectTour('gallery')">
        <h2>Gallery Tour</h2>
        <p>Explore the main figures and key elements.</p>
      </div>
      <div class="tourOption" onclick="selectTour('curator')">
        <h2>Curator's Tour</h2>
        <p>Discover hidden symbols and details.</p>
      </div>
    `;
  }
}

function selectTour(mode) {
  tourMode = mode;
  updateVisibleHotspots();
  startExperience();
}

function updateVisibleHotspots() {
  const allowedHotspots =
    tourMode === 'gallery' ? galleryHotspots : curatorHotspots;

  document.querySelectorAll('.hotspot').forEach(el => {
    const id = el.getAttribute('id');

    if (allowedHotspots.includes(id)) {
      if (el.classList.contains('captainDetail')) {
        el.setAttribute('visible', false);
      } else {
        el.setAttribute('visible', true);
      }
    } else {
      el.setAttribute('visible', false);
    }
  });
}

function showCaptainDetails() {
  if (tourMode !== 'curator') return;
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', true);
  });
}

function hideCaptainDetails() {
  document.querySelectorAll('.captainDetail').forEach(el => {
    el.setAttribute('visible', false);
  });
}

function getHaloForHotspot(id) {
  return document.querySelector('#' + id + 'Halo');
}

function showHalo(id) {
  const halo = getHaloForHotspot(id);
  if (!halo) return;

  halo.setAttribute('visible', true);
  halo.setAttribute(
    'animation',
    'property: material.opacity; from:0.04; to:0.12; dur:2800; dir:alternate; loop:true'
  );
}

function hideHalo(id) {
  const halo = getHaloForHotspot(id);
  if (!halo) return;

  halo.removeAttribute('animation');
  halo.setAttribute('visible', false);
}

function hideAllHalos() {
  Object.keys(hotspotTexts).forEach(id => hideHalo(id));
}

function makeCanvasTexture(text, language, width = 650, height = 250) {
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = 'rgba(17, 17, 17, 0.68)';
  roundRect(ctx, 0, 0, width, height, 34);
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.textBaseline = 'top';

  if (language === 'ar') {
    ctx.direction = 'rtl';
    ctx.textAlign = 'right';
    ctx.font = '25px Tahoma, Arial, sans-serif';
    drawWrappedText(ctx, text, width - 52, 38, width - 90, 46);
  } else {
    ctx.direction = 'ltr';
    ctx.textAlign = 'left';
    ctx.font = '24px Arial, sans-serif';
    drawWrappedText(ctx, text, 52, 38, width - 90, 46);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight) {
  const paragraphs = text.split('\n');

  for (const paragraph of paragraphs) {
    if (paragraph.trim() === '') {
      y += lineHeight * 0.65;
      continue;
    }

    const words = paragraph.split(' ');
    let line = '';

    for (let i = 0; i < words.length; i++) {
      const testLine = line + words[i] + ' ';
      if (ctx.measureText(testLine).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else {
        line = testLine;
      }
    }

    ctx.fillText(line.trim(), x, y);
    y += lineHeight;
  }
}

function setPanelText(panel, text, language) {
  const texture = makeCanvasTexture(text, language);
  const mesh = panel.getObject3D('mesh');
  if (!mesh) return;

  mesh.material.map = texture;
  mesh.material.transparent = true;
  mesh.material.needsUpdate = true;
}

function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  const now = Date.now();
  if (now - lastTextChangeTime < 800 && activeHotspot !== hotspot) return;
  lastTextChangeTime = now;

  activeHotspot = hotspot;

  const pos = hotspot.getAttribute('position');

  let panelX = pos.x + 0.68;
  if (pos.x > 0.8) panelX = pos.x - 0.68;

  let panelY = pos.y + 0.25;
  if (pos.y > 2.0) panelY = pos.y - 0.42;

  infoPanel.setAttribute('position', `${panelX} ${panelY} -2.8`);
  setPanelText(infoPanel, text, currentLanguage);
  infoPanel.setAttribute('visible', true);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  activeHotspot = null;
}

function addHotspot(id) {
  const el = document.querySelector('#' + id);
  if (!el) return;

  el.addEventListener('mouseenter', () => {
    if (!pageReady || !currentLanguage || !tourMode) return;

    const allowedHotspots =
      tourMode === 'gallery' ? galleryHotspots : curatorHotspots;

    if (!allowedHotspots.includes(id)) return;

    clearTimeout(infoTimer);
    clearTimeout(closeTimer);

    showHalo(id);

    infoTimer = setTimeout(() => {
      showInfo(hotspotTexts[id][currentLanguage], el);

      if (id === 'captain') {
        showCaptainDetails();
      }

      if (id !== 'captain' && !el.classList.contains('captainDetail')) {
        hideCaptainDetails();
      }
    }, 2000);
  });

  el.addEventListener('mouseleave', () => {
    clearTimeout(infoTimer);
    hideHalo(id);
    hideInfo();
  });
}

function startExperience() {
  pageReady = true;
  languageOverlay.style.display = 'none';
  gazeCursor.setAttribute('visible', true);

  const welcomeText =
    currentLanguage === 'ar'
      ? tourMode === 'gallery'
        ? 'بدأت جولة المعرض. انظر إلى العناصر الرئيسية في اللوحة.'
        : 'بدأت جولة القيّم الفني. اختر القائد لاكتشاف تفاصيل داخلية إضافية.'
      : tourMode === 'gallery'
        ? 'Gallery Tour started. Look at the main elements of the painting.'
        : "Curator's Tour started. Select the Captain to reveal inner details.";

  setPanelText(welcomePanel, welcomeText, currentLanguage);
  welcomePanel.setAttribute('visible', true);

  setTimeout(() => {
    welcomePanel.setAttribute('visible', false);
  }, 3500);
}

Object.keys(hotspotTexts).forEach(addHotspot);

window.addEventListener('load', () => {
  hideInfo();
  hideAllHalos();
  pageReady = false;
  currentLanguage = null;
  tourMode = null;
  gazeCursor.setAttribute('visible', false);

  document.querySelectorAll('.hotspot').forEach(el => {
    el.setAttribute('visible', false);
  });
});
</script>

</body>
</html>
