<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>The Night Watch Interactive</title>
<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

  <!-- Painting -->
  <a-image
    src="painting.jpg"
    position="0 1.6 -3"
    width="4"
    height="3.45">
  </a-image>

  <!-- HOTSPOTS -->
  <a-plane class="hotspot" id="captain"
    position="-0.05 1.35 -2.95"
    width="0.35" height="0.75"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="lieutenant"
    position="0.45 1.30 -2.95"
    width="0.35" height="0.80"
    material="color:cyan; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="girl"
    position="-0.65 1.18 -2.95"
    width="0.32" height="0.60"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="drummer"
    position="1.55 1.25 -2.95"
    width="0.38" height="0.80"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="flag"
    position="-1.25 2.10 -2.95"
    width="0.45" height="1.10"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="musketeer"
    position="-0.95 1.45 -2.95"
    width="0.35" height="0.65"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="dog"
    position="0.95 0.75 -2.95"
    width="0.35" height="0.25"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="leftGroup"
    position="-1.55 1.35 -2.95"
    width="0.45" height="0.90"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="rightGroup"
    position="1.35 1.60 -2.95"
    width="0.50" height="0.80"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <a-plane class="hotspot" id="backgroundArch"
    position="0.45 2.25 -2.95"
    width="0.80" height="0.55"
    material="color:yellow; opacity:0; transparent:true">
  </a-plane>

  <!-- INFO PANEL -->
  <a-plane
    id="infoPanel"
    visible="false"
    position="2.5 1.65 -2.8"
    width="2.5"
    height="1.3"
    color="#222">
  </a-plane>

  <a-text
    id="infoText"
    visible="false"
    value=""
    position="1.35 2.05 -2.75"
    width="2.2"
    color="white">
  </a-text>

  <!-- WELCOME -->
  <a-text
    id="welcome"
    value="Loading experience..."
    position="-0.8 0.25 -2.8"
    width="2"
    color="black">
  </a-text>

  <!-- CAMERA -->
  <a-camera position="0 1.6 0">
    <a-cursor
      id="gazeCursor"
      visible="false"
      fuse="true"
      fuse-timeout="1000"
      raycaster="objects: .hotspot"
      color="black">
    </a-cursor>
  </a-camera>

</a-scene>

<script>

const infoPanel = document.querySelector('#infoPanel');
const infoText = document.querySelector('#infoText');
const welcome = document.querySelector('#welcome');
const gazeCursor = document.querySelector('#gazeCursor');

let pageReady = false;
let closeTimer = null;
let activeHotspot = null;
let lastTextChangeTime = 0;

function showInfo(text, hotspot) {
  clearTimeout(closeTimer);

  activeHotspot = hotspot;

  infoPanel.setAttribute('visible', true);
  infoText.setAttribute('visible', true);
  infoText.setAttribute('value', text);
}

function hideInfo() {
  infoPanel.setAttribute('visible', false);
  infoText.setAttribute('visible', false);
  infoText.setAttribute('value', '');
  activeHotspot = null;
}

function hideInfoDelayed(hotspot) {
  clearTimeout(closeTimer);

  closeTimer = setTimeout(() => {
    if (activeHotspot === hotspot) {
      hideInfo();
    }
  }, 1000);
}

function addHotspot(id, text, color='yellow') {

  const el = document.querySelector(id);

  el.addEventListener('mouseenter', () => {
    if (!pageReady) return;

    clearTimeout(closeTimer);

    el.setAttribute(
      'material',
      `color:${color}; opacity:0.25; transparent:true`
    );
  });

  el.addEventListener('click', () => {
    if (!pageReady) return;

    const now = Date.now();

    if (now - lastTextChangeTime < 1000) return;

    lastTextChangeTime = now;
    showInfo(text, el);
});

  el.addEventListener('mouseleave', () => {

    el.setAttribute(
      'material',
      `color:${color}; opacity:0; transparent:true`
    );

    hideInfoDelayed(el);
  });
}

addHotspot('#captain',
'Captain Frans Banning Cocq\n\nLeader of the Amsterdam civic guard and the central figure of the composition.');

addHotspot('#lieutenant',
'Lieutenant Willem van Ruytenburch\n\nRecognizable by his bright yellow costume and illuminated appearance.');

addHotspot('#girl',
'The Girl with the Chicken\n\nA symbolic figure carrying objects associated with the civic guard.');

addHotspot('#drummer',
'The Drummer\n\nAdds energy and movement, helping create the feeling of a marching company.');

addHotspot('#flag',
'The Flag Bearer\n\nThe militia flag identifies the company and adds drama to the scene.');

addHotspot('#musketeer',
'The Musketeer\n\nOne of several armed guards demonstrating the company in action.');

addHotspot('#dog',
'The Dog\n\nA small detail that adds realism and movement to the composition.');

addHotspot('#leftGroup',
'Left Group of Guards\n\nThese figures create depth and lead the viewer into the painting.');

addHotspot('#rightGroup',
'Right Group of Guards\n\nBalances the composition and frames the main subjects.');

addHotspot('#backgroundArch',
'Background Architecture\n\nThe dark architectural setting enhances the dramatic lighting.');

window.addEventListener('load', () => {

  hideInfo();

  setTimeout(() => {

    pageReady = true;

    gazeCursor.setAttribute('visible', true);

    welcome.setAttribute('visible', false);

  }, 3000);

});
</script>

</body>
</html>
